name: Test

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build and install LookseeCore
        run: mvn -B -ntp clean install -DskipTests -Dspring.profiles.active=test
        working-directory: LookseeCore

      - name: Test with Maven
        run: mvn test

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute Docker-safe tag from branch
        id: docker_tag
        run: |
          SAFE_TAG=$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9_.-]+#-#g; s#^-+##; s#-+$##; s#\.{2,}#.#g')
          if [ -z "$SAFE_TAG" ]; then
            SAFE_TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t deepthought42/content-audit:${{ steps.docker_tag.outputs.tag }} .
          docker tag deepthought42/content-audit:${{ steps.docker_tag.outputs.tag }} deepthought42/content-audit:latest
