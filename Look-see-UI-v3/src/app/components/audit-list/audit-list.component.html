<!-- Audit form -->
<app-audit-form (auditRecordData)="addItem($event)"></app-audit-form>

<!-- Audit table -->
<div class="px-6 pb-6">
    <!-- Loading state (skeleton rows) -->
    <div *ngIf="is_loading_audits" class="mt-4">
        <looksee-skeleton variant="row" [rows]="4"></looksee-skeleton>
    </div>

    <!-- Empty state (no records, not loading) -->
    <looksee-empty-state
        *ngIf="!is_loading_audits && audit_records.length === 0"
        illustration="audits"
        title="Run your first audit."
        body="Paste a URL above — we'll check accessibility, content quality, and visual design, and rank every issue by impact."
        [compact]="true">
    </looksee-empty-state>

    <!-- Table header -->
    <div *ngIf="!is_loading_audits && audit_records.length > 0"
         class="grid grid-cols-12 gap-4 px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">
        <div class="col-span-4">URL</div>
        <div class="col-span-1 text-center">Status</div>
        <div class="col-span-1 text-center">Type</div>
        <div class="col-span-2 text-center">Content</div>
        <div class="col-span-2 text-center">Info Architecture</div>
        <div class="col-span-1 text-center">Aesthetic</div>
        <div class="col-span-1"></div>
    </div>

    <!-- Audit rows -->
    <div class="space-y-2 mt-2">
        <div *ngFor="let audit_record of audit_records"
             class="card-interactive px-5 py-4"
             (click)="selectAudit(audit_record)"
             (keydown.enter)="selectAudit(audit_record)"
             (keydown.space)="selectAudit(audit_record)"
             tabindex="0"
             role="button"
             [attr.aria-label]="'Select audit for ' + audit_record.url">
            <div class="grid grid-cols-12 gap-4 items-center">
                <!-- URL -->
                <div class="col-span-4">
                    <p class="text-sm font-medium text-gray-900 truncate">
                        {{ audit_record.url }}
                    </p>
                </div>

                <!-- Status -->
                <div class="col-span-1 flex justify-center">
                    <looksee-status-chip
                        [kind]="statusFor(audit_record)"
                        size="sm">
                    </looksee-status-chip>
                </div>

                <!-- Type -->
                <div class="col-span-1 flex justify-center">
                    <span class="badge"
                          [ngClass]="{
                              'bg-blue-50 text-blue-700': audit_record.level === 'PAGE',
                              'bg-purple-50 text-purple-700': audit_record.level === 'DOMAIN'
                          }">
                        {{ audit_record.level }}
                    </span>
                </div>

                <!-- Content Score -->
                <div class="col-span-2 flex justify-center">
                    <app-score-badge
                        [score]="audit_record.contentAuditScore"
                        [loading]="audit_record.contentAuditScore < 1"
                        size="sm">
                    </app-score-badge>
                </div>

                <!-- Info Architecture Score -->
                <div class="col-span-2 flex justify-center">
                    <app-score-badge
                        [score]="audit_record.infoArchScore"
                        [loading]="audit_record.infoArchScore < 1"
                        size="sm">
                    </app-score-badge>
                </div>

                <!-- Aesthetic Score -->
                <div class="col-span-1 flex justify-center">
                    <app-score-badge
                        [score]="audit_record.aestheticScore"
                        [loading]="audit_record.aestheticScore < 1"
                        size="sm">
                    </app-score-badge>
                </div>

                <!-- Chevron -->
                <div class="col-span-1 flex justify-center">
                    <fa-icon [icon]="faChevronRight" class="text-gray-400 text-sm"></fa-icon>
                </div>
            </div>
        </div>
    </div>
</div>
