events{}
http {
    include /etc/nginx/mime.types;
    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        location ^~ /assets/ {
            root /var/www/;
            gzip_static on;
            expires max;
            add_header Cache-Control public;
        }
    }
}

