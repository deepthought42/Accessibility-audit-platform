name: PR Test

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Run Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19.3'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting
      run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19.3'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create environment.ts from template
      run: |
        cp src/environments/environment.ts.template src/environments/environment.ts
      
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        google-chrome --version
      
    - name: Run unit tests
      env:
        CHROME_BIN: /usr/bin/google-chrome
      run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
      
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./coverage/Look-see-UX-audit-UI/lcov.info
        flags: unittests
        name: codecov-umbrella

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        # Create dummy SSL files for build (since they're required by Dockerfile)
        mkdir -p credentials
        touch credentials/auth_config.json
        # Create environment.ts from template for Docker build
        cp src/environments/environment.ts.template src/environments/environment.ts
        
        # Build the Docker image
        docker build -t looksee-ui:test .
        
    - name: Verify Docker image
      run: |
        # Verify the image was created successfully
        docker images | grep looksee-ui.*test
        
        # Test that the image can be run (without actually starting the container)
        docker run --rm looksee-ui:test nginx -t