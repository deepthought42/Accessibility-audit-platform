name: Test

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build and install LookseeCore
        run: mvn -B -ntp clean install -DskipTests -Dspring.profiles.active=test
        working-directory: LookseeCore

      - name: Test with Maven
        run: mvn test
        
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanitize Docker tag from branch name
        run: |
          raw_branch="${{ github.head_ref }}"
          safe_tag=$(echo "$raw_branch" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g' | sed 's/^-*//;s/-*$//' | cut -c1-128)

          if [ -z "$safe_tag" ]; then
            safe_tag="pr-${{ github.event.pull_request.number }}"
          fi

          echo "DOCKER_TAG=$safe_tag" >> "$GITHUB_ENV"
        
      - name: Build Docker image
        run: |
          docker build --build-arg LOOKSEE_CORE_VERSION="$(cat ../LOOKSEE_CORE_VERSION)" -t deepthought42/journey-executor:${{ env.DOCKER_TAG }} .
          docker tag deepthought42/journey-executor:${{ env.DOCKER_TAG }} deepthought42/journey-executor:latest
