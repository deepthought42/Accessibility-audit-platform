# Shared Spring property overrides for the local docker-compose stack.
# Mounted into every Java service at /etc/looksee/local-overrides.properties
# and loaded via SPRING_CONFIG_ADDITIONAL_LOCATION.
#
# The non-CrawlerAPI services keep their `spring.data.neo4j.*` and
# `pubsub.*` lines commented out in their classpath application.properties,
# so we wire them up here from compose env vars.

spring.data.neo4j.uri=${NEO4J_BOLT_URI:bolt://neo4j:7687}
spring.data.neo4j.username=${NEO4J_USERNAME:neo4j}
spring.data.neo4j.password=${NEO4J_PASSWORD:change-me}
spring.data.neo4j.database=${NEO4J_DATABASE_NAME:neo4j}

spring.cloud.gcp.project-id=${PROJECT_ID:looksee-local}
spring.cloud.gcp.credentials.location=
spring.cloud.gcp.pubsub.emulator-host=${PUBSUB_EMULATOR_HOST:pubsub-emulator:8085}

# Topic names (services read these via @Value("${pubsub.<name>}"))
pubsub.url_topic=${URL_TOPIC:url-topic}
pubsub.page_audit_topic=${PAGE_AUDIT_TOPIC:page-audit-topic}
pubsub.audit_update=${AUDIT_UPDATE_TOPIC:audit-update-topic}
pubsub.error_topic=${ERROR_TOPIC:audit-error-topic}
pubsub.page_built=${PAGE_CREATED_TOPIC:page-created-topic}
pubsub.journey_verified=${JOURNEY_VERIFIED_TOPIC:journey-verified-topic}
pubsub.discarded_journey_topic=${JOURNEY_DISCARDED_TOPIC:journey-discarded-topic}
pubsub.journey_candidate=${JOURNEY_CANDIDATE_TOPIC:journey-candidate-topic}

# Stripe placeholders so journeyErrors (and any other service with bare
# ${stripe.checkout_*_url} @Value injections) can boot. Local stack does
# not exercise the Stripe code path.
stripe.checkout_success_url=${STRIPE_CHECKOUT_SUCCESS_URL:http://localhost:4200/billing/success}
stripe.checkout_cancel_url=${STRIPE_CHECKOUT_CANCEL_URL:http://localhost:4200/billing/cancel}
stripe.api_key=${STRIPE_API_KEY:}
stripe.secretKey=${STRIPE_SECRET_KEY:}
stripe.webhook_secret=${STRIPE_WEBHOOK_SECRET:}

# Pusher placeholders so the broadcaster service (which @Value-injects all
# four bare placeholders) can boot. Pusher push is a no-op locally; the
# Java service still constructs PusherConnector but does not broadcast.
pusher.appId=${PUSHER_APP_ID:}
pusher.key=${PUSHER_KEY:}
pusher.secret=${PUSHER_SECRET:}
pusher.cluster=${PUSHER_CLUSTER:mt1}
