name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Verify every service builds against the same LookseeCore release.
  # The single source of truth is the repo-root LOOKSEE_CORE_VERSION file.
  # ---------------------------------------------------------------------------
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify LookseeCore version is unified
        run: |
          set -euo pipefail
          if [ ! -f LOOKSEE_CORE_VERSION ]; then
            echo "LOOKSEE_CORE_VERSION file is missing from the repo root" >&2
            exit 1
          fi
          expected="$(cat LOOKSEE_CORE_VERSION)"
          echo "Expected LookseeCore version: $expected"

          # 1. No service Dockerfile may bake in a hardcoded LookseeCore version.
          bad_dockerfile=$(grep -rEn 'libs/core-[0-9]+\.[0-9]+\.[0-9]+\.jar|LOOKSEE_CORE_VERSION=[0-9]' \
                              --include='Dockerfile' . || true)
          if [ -n "$bad_dockerfile" ]; then
            echo "Hardcoded LookseeCore version found in Dockerfile(s):" >&2
            echo "$bad_dockerfile" >&2
            exit 1
          fi

          # 2. Every service pom.xml that pins LookseeCore must match the root file.
          mismatches=$(grep -rEn '<(looksee-core|core)\.version>([^<]+)</' --include='pom.xml' . \
                       | grep -v ">${expected}<" || true)
          if [ -n "$mismatches" ]; then
            echo "pom.xml files pin a LookseeCore version != $expected:" >&2
            echo "$mismatches" >&2
            exit 1
          fi

          # 3. scripts/download-core.sh must exist and be executable.
          test -x scripts/download-core.sh || (echo "scripts/download-core.sh missing or not executable" >&2; exit 1)

          echo "OK: LookseeCore version $expected is unified across the monorepo."

      - name: Forbid System.out / System.err in main Java sources
        run: |
          set -euo pipefail
          # Test code is allowed to use println for diagnostics; only enforce on main.
          hits=$(grep -rEn 'System\.(out|err)\.' \
                  --include='*.java' \
                  $(find . -type d -path '*/src/main/java' 2>/dev/null) \
                  || true)
          if [ -n "$hits" ]; then
            echo "System.out/System.err is forbidden in main Java sources. Use SLF4J instead." >&2
            echo "$hits" >&2
            exit 1
          fi
          echo "OK: no System.out/System.err in main sources."

  # ---------------------------------------------------------------------------
  # Detect which projects changed to skip unnecessary work
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      looksee-core: ${{ steps.filter.outputs.looksee-core }}
      audit-manager: ${{ steps.filter.outputs.audit-manager }}
      crawler-api: ${{ steps.filter.outputs.crawler-api }}
      page-builder: ${{ steps.filter.outputs.page-builder }}
      audit-service: ${{ steps.filter.outputs.audit-service }}
      content-audit: ${{ steps.filter.outputs.content-audit }}
      element-enrichment: ${{ steps.filter.outputs.element-enrichment }}
      info-arch-audit: ${{ steps.filter.outputs.info-arch-audit }}
      journey-map-cleanup: ${{ steps.filter.outputs.journey-map-cleanup }}
      journey-errors: ${{ steps.filter.outputs.journey-errors }}
      journey-executor: ${{ steps.filter.outputs.journey-executor }}
      journey-expander: ${{ steps.filter.outputs.journey-expander }}
      frontend-broadcaster: ${{ steps.filter.outputs.frontend-broadcaster }}
      visual-design-audit: ${{ steps.filter.outputs.visual-design-audit }}
      ui: ${{ steps.filter.outputs.ui }}
      chrome-extension: ${{ steps.filter.outputs.chrome-extension }}
      vscode-plugin: ${{ steps.filter.outputs.vscode-plugin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            looksee-core:
              - 'LookseeCore/**'
            audit-manager:
              - 'AuditManager/**'
              - 'LookseeCore/**'
            crawler-api:
              - 'CrawlerAPI/**'
              - 'LookseeCore/**'
            page-builder:
              - 'PageBuilder/**'
              - 'LookseeCore/**'
            audit-service:
              - 'audit-service/**'
              - 'LookseeCore/**'
            content-audit:
              - 'contentAudit/**'
              - 'LookseeCore/**'
            element-enrichment:
              - 'element-enrichment/**'
              - 'LookseeCore/**'
            info-arch-audit:
              - 'informationArchitectureAudit/**'
              - 'LookseeCore/**'
            journey-map-cleanup:
              - 'journey-map-cleanup/**'
              - 'LookseeCore/**'
            journey-errors:
              - 'journeyErrors/**'
              - 'LookseeCore/**'
            journey-executor:
              - 'journeyExecutor/**'
              - 'LookseeCore/**'
            journey-expander:
              - 'journeyExpander/**'
              - 'LookseeCore/**'
            frontend-broadcaster:
              - 'look-see-front-end-broadcaster/**'
              - 'LookseeCore/**'
            visual-design-audit:
              - 'visualDesignAudit/**'
              - 'LookseeCore/**'
            ui:
              - 'Look-see-UI-v3/**'
            chrome-extension:
              - 'LookseeChromeExtension/**'
            vscode-plugin:
              - 'look-see-VSCode-plugin/**'

  # ---------------------------------------------------------------------------
  # LookseeCore (multi-module Maven, Java 17)
  # ---------------------------------------------------------------------------
  looksee-core:
    needs: changes
    if: needs.changes.outputs.looksee-core == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LookseeCore
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: LookseeCore/pom.xml

      - name: Test
        run: >
          mvn -B -ntp test
          -DfailIfNoTests=false
          -Dspring.profiles.active=test
          -Dspring.cloud.gcp.pubsub.enabled=false
          -Dspring.cloud.gcp.storage.enabled=false
          -Dspring.cloud.gcp.vision.enabled=false
          -Dspring.cloud.gcp.project-id=test-project
          -Dtest='!browser.BrowserTest'
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build
        run: mvn -B -ntp clean install -DskipTests -DfailIfNoTests=false -Dspring.profiles.active=test
        env:
          SPRING_PROFILES_ACTIVE: test

  # ---------------------------------------------------------------------------
  # Java 17 Maven services (depend on LookseeCore source build)
  # ---------------------------------------------------------------------------
  java17-services:
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: AuditManager
            flag: audit-manager
          - project: PageBuilder
            flag: page-builder
          - project: audit-service
            flag: audit-service
          - project: contentAudit
            flag: content-audit
          - project: informationArchitectureAudit
            flag: info-arch-audit
          - project: journeyExecutor
            flag: journey-executor
          - project: journeyExpander
            flag: journey-expander
          - project: visualDesignAudit
            flag: visual-design-audit
          - project: element-enrichment
            flag: element-enrichment
          - project: journeyErrors
            flag: journey-errors
          - project: look-see-front-end-broadcaster
            flag: frontend-broadcaster
          - project: journey-map-cleanup
            flag: journey-map-cleanup
    if: >
      needs.changes.outputs.audit-manager == 'true' ||
      needs.changes.outputs.page-builder == 'true' ||
      needs.changes.outputs.audit-service == 'true' ||
      needs.changes.outputs.content-audit == 'true' ||
      needs.changes.outputs.info-arch-audit == 'true' ||
      needs.changes.outputs.journey-executor == 'true' ||
      needs.changes.outputs.journey-expander == 'true' ||
      needs.changes.outputs.visual-design-audit == 'true' ||
      needs.changes.outputs.element-enrichment == 'true' ||
      needs.changes.outputs.journey-errors == 'true' ||
      needs.changes.outputs.frontend-broadcaster == 'true' ||
      needs.changes.outputs.journey-map-cleanup == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if project changed
        id: should-run
        run: |
          FLAG="${{ needs.changes.outputs[matrix.flag] }}"
          echo "run=$FLAG" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Set up JDK 17
        if: steps.should-run.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: ${{ matrix.project }}/pom.xml

      - name: Build and install LookseeCore
        if: steps.should-run.outputs.run == 'true'
        run: mvn -B -ntp clean install -DskipTests -Dspring.profiles.active=test
        working-directory: LookseeCore

      - name: Test
        if: steps.should-run.outputs.run == 'true'
        run: mvn -B -ntp clean test

      - name: Build
        if: steps.should-run.outputs.run == 'true'
        run: mvn -B -ntp package -DskipTests

  # ---------------------------------------------------------------------------
  # CrawlerAPI (Java 21, depends on LookseeCore source build)
  # ---------------------------------------------------------------------------
  crawler-api:
    needs: changes
    if: needs.changes.outputs.crawler-api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CrawlerAPI
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: CrawlerAPI/pom.xml

      - name: Build and install LookseeCore
        run: mvn -B -ntp clean install -DskipTests -Dspring.profiles.active=test
        working-directory: LookseeCore

      - name: Test
        run: mvn -B -ntp test

      - name: Build
        run: mvn -B -ntp package -DskipTests

  # ---------------------------------------------------------------------------
  # Angular UI (Node 20)
  # ---------------------------------------------------------------------------
  ui:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Look-see-UI-v3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Look-see-UI-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Create environment.ts from template
        run: cp src/environments/environment.ts.template src/environments/environment.ts

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Test
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build:direct -- --configuration=production

  # ---------------------------------------------------------------------------
  # VS Code Plugin (Node 20, TypeScript)
  # ---------------------------------------------------------------------------
  vscode-plugin:
    needs: changes
    if: needs.changes.outputs.vscode-plugin == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: look-see-VSCode-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

  # ---------------------------------------------------------------------------
  # Chrome Extension (Node 20)
  # ---------------------------------------------------------------------------
  chrome-extension:
    needs: changes
    if: needs.changes.outputs.chrome-extension == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LookseeChromeExtension
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: LookseeChromeExtension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm ls --all --json > /dev/null 2>&1 || true

  # ---------------------------------------------------------------------------
  # Docker Hub Push (only on push to main/master, not on PRs)
  # ---------------------------------------------------------------------------
  docker-push:
    needs:
      - changes
      - looksee-core
      - java17-services
      - crawler-api
      - ui
    # Run only on push (not PRs), and even if upstream jobs were skipped (no changes),
    # but not if any that actually ran have failed
    if: >
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: AuditManager
            flag: audit-manager
            image: deepthought42/audit-manager
          - project: CrawlerAPI
            flag: crawler-api
            image: deepthought42/looksee-api
          - project: PageBuilder
            flag: page-builder
            image: deepthought42/page-builder
          - project: audit-service
            flag: audit-service
            image: deepthought42/audit-update-service
          - project: contentAudit
            flag: content-audit
            image: deepthought42/content-audit
          - project: informationArchitectureAudit
            flag: info-arch-audit
            image: deepthought42/information-architecture-audit
          - project: journeyExecutor
            flag: journey-executor
            image: deepthought42/journey-executor
          - project: journeyExpander
            flag: journey-expander
            image: deepthought42/journey-expander
          - project: visualDesignAudit
            flag: visual-design-audit
            image: deepthought42/visual-design-audit
          - project: journey-map-cleanup
            flag: journey-map-cleanup
            image: deepthought42/journey-map-cleanup
          - project: element-enrichment
            flag: element-enrichment
            image: deepthought42/element-enrichment
          - project: journeyErrors
            flag: journey-errors
            image: deepthought42/journey-errors
          - project: look-see-front-end-broadcaster
            flag: frontend-broadcaster
            image: deepthought42/frontend-broadcaster
          - project: Look-see-UI-v3
            flag: ui
            image: deepthought42/looksee-ui
    steps:
      - name: Check if project changed
        id: should-run
        run: |
          FLAG="${{ needs.changes.outputs[matrix.flag] }}"
          echo "run=$FLAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.should-run.outputs.run == 'true'

      - name: Set short SHA tag
        if: steps.should-run.outputs.run == 'true'
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build Docker image
        if: steps.should-run.outputs.run == 'true'
        working-directory: ${{ matrix.project }}
        run: |
          docker build -t ${{ matrix.image }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ matrix.image }}:${{ env.IMAGE_TAG }} ${{ matrix.image }}:latest

      - name: Login to Docker Hub
        if: steps.should-run.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: steps.should-run.outputs.run == 'true'
        run: |
          docker push ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          docker push ${{ matrix.image }}:latest
