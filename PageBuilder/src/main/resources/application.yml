resilience4j.retry:
    configs:
        default:
            maxAttempts: 1
            waitDuration: 5s
            retryExceptions:
                - org.springframework.web.client.HttpServerErrorException
                - java.util.concurrent.TimeoutException
                - java.io.IOException
                - java.net.SocketException
                - java.net.ConnectException
                - java.lang.Exception
        webdriver:
            maxAttempts: 5
            waitDuration: 1s
            retryExceptions:
                - org.openqa.selenium.WebDriverException
                - org.openqa.selenium.remote.UnreachableBrowserException
                - org.openqa.selenium.NoSuchSessionException
                - org.openqa.selenium.NoSuchElementException
                - org.openqa.selenium.ScriptTimeoutException
                - java.lang.Exception
                - java.io.IOException
                - java.net.ConnectException
                - java.net.SocketException
                - java.lang.NullPointerException
        neoforj:
            maxAttempts: 10
            waitDuration: 1s
            retryExceptions:
                - org.neo4j.ogm.exception.ConnectionException
                - org.neo4j.driver.exceptions.SessionExpiredException
                - org.neo4j.driver.exceptions.DiscoveryException
                - org.neo4j.driver.exceptions.TransientException
                - org.neo4j.ogm.exception.TransactionException
                - org.neo4j.ogm.exception.CypherException
                - java.net.SocketException
                - java.util.NoSuchElementException
        gcp:
            maxAttempts: 10
            waitDuration: 1s
            retryExceptions:
                - java.io.IOException
                - com.google.cloud.storage.StorageException
                - com.google.api.gax.rpc.ResourceExhaustedException
                - io.grpc.StatusRuntimeException
                - com.google.api.gax.rpc.UnknownException
                - java.nio.channels.ClosedChannelException
                - java.lang.RuntimeException
                - javax.imageio.IIOException
    instances:
        neoforj:
            baseConfig: neoforj
        webdriver:
            baseConfig: webdriver
        gcp:
            baseConfig: gcp
        default:
            baseConfig: default

# LookseeCore browsing configuration. Default mode is `local` — every instance
# opens a local Selenium driver. Flip to `remote` to route browser ops through
# brandonkindred/browser-service; requires LOOKSEE_BROWSING_SERVICE_URL set.
# See browser-service/phase-4-consumer-cutover.md §4a.5 for the cutover plan.
looksee:
    browsing:
        mode: ${LOOKSEE_BROWSING_MODE:local}
        service-url: ${LOOKSEE_BROWSING_SERVICE_URL:}
        connect-timeout: ${LOOKSEE_BROWSING_CONNECT_TIMEOUT:5s}
        read-timeout: ${LOOKSEE_BROWSING_READ_TIMEOUT:120s}
        smoke-check:
            enabled: ${LOOKSEE_BROWSING_SMOKE_CHECK_ENABLED:false}
            interval: ${LOOKSEE_BROWSING_SMOKE_CHECK_INTERVAL:60s}
            target-url: ${LOOKSEE_BROWSING_SMOKE_CHECK_TARGET_URL:https://example.com}
            browser: ${LOOKSEE_BROWSING_SMOKE_CHECK_BROWSER:CHROME}
