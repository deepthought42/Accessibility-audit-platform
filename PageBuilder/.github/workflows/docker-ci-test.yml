name: Test

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build and install LookseeCore
        run: mvn -B -ntp clean install -DskipTests -Dspring.profiles.active=test
        working-directory: LookseeCore

      - name: Test with Maven
        run: mvn test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Docker-safe image tag
        run: |
          RAW_TAG="${{ github.head_ref }}"
          SAFE_TAG="$(echo "${RAW_TAG}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g' | sed 's#-\{2,\}#-#g' | sed 's#^[.-]*##; s#[.-]*$##')"
          if [ -z "${SAFE_TAG}" ]; then
            SAFE_TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "IMAGE_TAG=${SAFE_TAG}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build --build-arg LOOKSEE_CORE_VERSION="$(cat ../LOOKSEE_CORE_VERSION)" -t deepthought42/page-builder:${{ env.IMAGE_TAG }} .
          docker tag deepthought42/page-builder:${{ env.IMAGE_TAG }} deepthought42/page-builder:latest
