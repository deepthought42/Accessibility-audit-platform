name: Test

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build and install LookseeCore
        run: mvn -B -ntp clean install -DskipTests -Dspring.profiles.active=test
        working-directory: LookseeCore

      - name: Test with Maven
        run: mvn --batch-mode --no-transfer-progress test
        
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanitize branch name for Docker tag
        run: |
          SANITIZED_TAG=$(echo "${{ github.head_ref }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-128)
          if [ -z "$SANITIZED_TAG" ]; then
            SANITIZED_TAG="pr-${{ github.event.number }}"
          fi
          echo "SANITIZED_TAG=$SANITIZED_TAG" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t deepthought42/information-architecture-audit:${SANITIZED_TAG} .
          docker tag deepthought42/information-architecture-audit:${SANITIZED_TAG} deepthought42/information-architecture-audit:latest
